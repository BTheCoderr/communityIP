[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Legacy WordPress URL redirects
[[redirects]]
  from = "/2025/12/10/community-ip-awarded-microgrant-from-social-enterprise-greenhouse"
  to = "/news/seg-microgrant-2025"
  status = 301

[[redirects]]
  from = "/2025/12/10/community-ip-awarded-microgrant-from-social-enterprise-greenhouse/"
  to = "/news/seg-microgrant-2025"
  status = 301

[[redirects]]
  from = "/2025/03/03/new-post"
  to = "/news/seg-accelerator-2025"
  status = 301

[[redirects]]
  from = "/2025/03/03/new-post/"
  to = "/news/seg-accelerator-2025"
  status = 301

[[redirects]]
  from = "/2025/03/03/current-post"
  to = "/news/lost-einsteins"
  status = 301

[[redirects]]
  from = "/2025/03/03/current-post/"
  to = "/news/lost-einsteins"
  status = 301

[[redirects]]
  from = "/board-of-directors"
  to = "/board"
  status = 301

[[redirects]]
  from = "/board-of-directors/"
  to = "/board"
  status = 301

# Domain canonicalization (apex ↔ www) is handled in Netlify → Domain management → Primary domain.
# Do NOT add apex↔www redirects here — conflicting rules cause ERR_TOO_MANY_REDIRECTS.
