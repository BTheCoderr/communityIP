<!DOCTYPE html>
<html>
  <head><title>Forms</title></head>
  <body>
    <!-- Netlify form detection (hidden) — must match React form field names -->

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
    </form>

    <form name="intake" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="referenceNumber" />
      <input type="text" name="consentEducational" />
      <input type="text" name="consentPrivacy" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <input type="text" name="preferredContact" />
      <input type="text" name="personaType" />
      <input type="text" name="incomeRange" />
      <input type="text" name="seekingFunding" />
      <input type="text" name="ideaTitle" />
      <textarea name="ideaDescription"></textarea>
      <input type="text" name="ideaStage" />
      <input type="text" name="industry" />
      <input type="text" name="publiclyDisclosed" />
      <textarea name="disclosureDetails"></textarea>
      <input type="text" name="offeredForSale" />
      <input type="text" name="priorFilings" />
      <textarea name="priorFilingsDetails"></textarea>
      <input type="text" name="supportTypes" />
      <input type="text" name="primaryNeed" />
      <input type="text" name="urgency" />
      <input type="text" name="preferredSupport" />
      <textarea name="additionalInfo"></textarea>
      <input type="text" name="consentAccurate" />
      <input type="text" name="consentContact" />
      <input type="text" name="consentNda" />
    </form>

    <form name="volunteer-interest" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="role" />
      <textarea name="message"></textarea>
    </form>

    <form name="partner-interest" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="orgName" />
      <input type="text" name="contactName" />
      <input type="email" name="email" />
      <input type="text" name="role" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
